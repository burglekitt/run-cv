<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      property="og:image"
      content="https://opengraph.githubassets.com/1/burglekitt/run-cv"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <title>RUN-CV | burglekitt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bright-green: #00ff00;
        --mid-green: #008000;
        --dark-green: #003300;
      }
      body {
        background-color: #000000;
        font-family: "JetBrains Mono", monospace;
        color: var(--bright-green);
        overflow: hidden;
      }
      /* Minimalist "Monitor" Frame */
      .monitor-frame {
        border: 2px solid var(--dark-green);
        box-shadow: 0 0 20px rgba(0, 51, 0, 0.5);
      }
      .crt-overlay {
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.03),
            rgba(0, 255, 0, 0.01),
            rgba(0, 0, 255, 0.03)
          );
        background-size:
          100% 3px,
          2px 100%;
        pointer-events: none;
        z-index: 50;
      }
      .scanline {
        width: 100%;
        height: 100px;
        z-index: 40;
        background: linear-gradient(
          0deg,
          rgba(0, 255, 0, 0) 0%,
          rgba(0, 255, 0, 0.05) 50%,
          rgba(0, 255, 0, 0) 100%
        );
        opacity: 0.1;
        position: absolute;
        bottom: 100%;
        animation: scanline 10s linear infinite;
      }
      @keyframes scanline {
        0% {
          bottom: 100%;
        }
        100% {
          bottom: -100px;
        }
      }
    </style>
  </head>
  <body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="fixed inset-0 crt-overlay"></div>
    <div class="scanline"></div>

    <main class="relative z-10 w-full max-w-5xl">
      <div class="flex justify-between items-end mb-2 px-1">
        <div
          class="text-[10px] uppercase tracking-widest text-[var(--mid-green)]"
        >
          Burglekitt OS // Terminal_Interface
        </div>
        <div
          class="text-[10px] uppercase tracking-widest text-[var(--mid-green)]"
        >
          Status: Operational
        </div>
      </div>

      <div class="monitor-frame bg-black overflow-hidden rounded-sm relative">
        <iframe
          src="https://stackblitz.com/edit/run-cv?ctl=1&embed=1&file=index.js&hideExplorer=1&hideNavigation=1&hidePreview=1&terminalHeight=100&theme=dark&view=editor"
          style="
            width: 100%;
            height: 75vh;
            border: 0;
            border-radius: 4px;
            background: #000;
          "
          title="run-cv live terminal"
          allow="clipboard-read; clipboard-write"
          loading="lazy"
        ></iframe>
      </div>

      <div
        class="mt-6 flex flex-col md:flex-row justify-between items-center gap-6 px-1"
      >
        <div class="max-w-md">
          <p class="text-xs leading-relaxed text-[var(--mid-green)]">
            Click
            <span class="text-[var(--bright-green)]">"Run Project"</span> to
            boot. Once initialized, execute: <br />
            <code class="text-[var(--bright-green)] font-bold"
              >> npx run-cv &lt;name&gt;</code
            >
          </p>
        </div>
        <div class="flex gap-4">
          <a
            href="https://github.com/burglekitt/run-cv"
            class="border border-[var(--dark-green)] px-4 py-2 text-[10px] uppercase hover:border-[var(--bright-green)] hover:text-[var(--bright-green)] transition-all"
            target="_blank"
          >
            [ View Source ]
          </a>
          <a
            href="https://www.linkedin.com/in/craigocurtis"
            class="border border-[var(--dark-green)] px-4 py-2 text-[10px] uppercase hover:border-[var(--bright-green)] hover:text-[var(--bright-green)] transition-all"
          >
            [ Contact Architect 1 ]
          </a>
          <a
            href="https://www.linkedin.com/in/baldur-p%C3%A1ll-h%C3%B3lmgeirsson-2a084b225"
            class="border border-[var(--dark-green)] px-4 py-2 text-[10px] uppercase hover:border-[var(--bright-green)] hover:text-[var(--bright-green)] transition-all"
          >
            [ Contact Architect 2 ]
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
