<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      property="og:image"
      content="https://opengraph.githubassets.com/1/burglekitt/run-cv"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <title>run-cv | burglekitt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0a0a0a;
        font-family: "Fira Code", monospace;
        overflow: hidden;
      }
      .terminal-glow {
        text-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
      }
      .crt-overlay {
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.06),
            rgba(0, 255, 0, 0.02),
            rgba(0, 0, 255, 0.06)
          );
        background-size:
          100% 4px,
          3px 100%;
        pointer-events: none;
      }
      .flicker {
        animation: flicker 0.15s infinite;
      }
      @keyframes flicker {
        0% {
          opacity: 0.97;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen p-4">
    <div class="fixed inset-0 crt-overlay z-10"></div>

    <main class="relative z-0 max-w-2xl w-full">
      <div
        class="border border-green-900/50 bg-black/80 rounded-lg shadow-2xl shadow-green-900/20 overflow-hidden"
      >
        <div
          class="bg-zinc-900 px-4 py-2 flex items-center gap-2 border-b border-green-900/30"
        >
          <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
          <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
          <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
          <span
            class="ml-2 text-xs text-green-800 font-bold uppercase tracking-widest"
            >burglekitt-terminal — 80x24</span
          >
        </div>

        <div class="p-8 text-green-500 flicker">
          <p class="mb-6 terminal-glow">Open a terminal and run the command:</p>

          <div
            class="bg-zinc-950 border border-green-500/30 p-4 rounded mb-8 relative group"
          >
            <code class="text-lg md:text-xl font-bold terminal-glow">
              <span class="text-green-800">$</span> npx run-cv
              <span class="animate-pulse">&lt;name&gt;</span>
            </code>
          </div>

          <div class="text-sm text-green-700/80">
            brought to you by
            <a
              href="https://github.com/burglekitt"
              class="text-green-500 hover:text-green-300 underline underline-offset-4 transition-colors"
            >
              burglekitt
            </a>
          </div>
        </div>
      </div>

      <div
        class="mt-4 flex justify-between px-2 text-[10px] text-green-900 uppercase tracking-tighter"
      >
        <span>System: Operational</span>
        <span>V 0.0.1</span>
      </div>
    </main>
  </body>
</html>
