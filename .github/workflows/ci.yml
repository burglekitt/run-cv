name: CI

on:
  push:
    branches: [main, feat/**, fix/**]
  pull_request:
    branches: [main, feat/**, fix/**]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Debug
        run: |
          node -v
          npm -v
          npm list --depth=0
          
      - name: Install dependencies
        run: npm install
      
      - name: Lint
        run: npm run lint
      
      - name: Test
        run: npm run test
      
      - name: Build
        run: npm run build
